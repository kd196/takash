name: takash
description: "Takaş - Konum tabanlı takas platformu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  cloud_functions: ^5.1.3
  firebase_crashlytics: ^4.1.3    # ← Eklendi
  firebase_analytics: ^11.3.3     # ← Eklendi

  # Mapbox
  mapbox_maps_flutter: ^2.4.0
  geolocator: ^13.0.2
  geoflutterfire_plus: ^0.0.17    # ← Eklendi (geofencing için kritik)

  # Stream Chat
  stream_chat_flutter: ^9.2.0

  # Utilities
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.3
  flutter_native_splash: ^2.4.1
  flutter_local_notifications: ^17.2.3
  google_fonts: ^6.2.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_native_splash:
  color: "#4CAF50"
  color_dark: "#1A1A2E"
  android_12:
    color: "#4CAF50"
    color_dark: "#1A1A2E"